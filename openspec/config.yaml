# SDD Configuration for CyberGuardians
# Updated: 2026-07-17

project:
  name: cyber-guardians
  version: "1.0.0"
  description: "CyberGuardians - Cybersecurity education platform for adolescents"

stack:
  framework: next
  framework_version: "16.2.10"
  language: typescript
  ui:
    - tailwindcss
    - framer-motion
    - radix-ui
    - lucide-react
  package_manager: pnpm
  package_manager_version: "11.13.0"
  node_version: "24.18.0"
  deployment: static-export-github-pages
  base_path: "/cyber-guardians"

persistence:
  mode: hybrid
  strict_tdd: false
  testing_framework: none

conventions:
  typescript:
    strict: true
    target: es5
    module_resolution: bundler
    path_aliases:
      "@/*": "./*"
  formatting:
    tool: none
    config: none
  linting:
    tool: next lint
    config: default
  architecture: app_router

testing:
  framework: none
  runner: none
  coverage: none
  layers: []
  strict_tdd: false
  note: "No test framework detected. Recommend installing vitest + @testing-library/react for unit/integration testing."

phases:
  proposal:
    requires: [exploration]
    outputs: [proposal]
  spec:
    requires: [proposal]
    outputs: [spec]
  design:
    requires: [proposal]
    outputs: [design]
  tasks:
    requires: [spec, design]
    outputs: [tasks]
  apply:
    requires: [tasks]
    outputs: [apply-progress]
  verify:
    requires: [spec, tasks, apply-progress]
    outputs: [verify-report]
  archive:
    requires: [all-artifacts]
    outputs: [archive-report]
